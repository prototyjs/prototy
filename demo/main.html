<h1 :class="{ show: true }" :dataset="{index: 2}">Prototy Demo</h1>

<div :context="{ p: state.product }" :onclick="state.product.params.count++">
    <span>Product Count: </span><span :text="p.params.count"></span> <span :context.scope="{ p1: p.params }"><span :text="p1.count"></span></span>
</div>

<div :text.json="state.product" id="foo"></div>

<div :text="state.product.params.count"></div>

<div :onclick="state.product.params.count++">add</div>
<div :component="state.show ? components.first : components.second" :oncreate.async="new Promise(resolve => setTimeout(resolve, 2000))" :ondestroy="console.log(event)"></div>
<!--<div :component="state.show && components.first" :oncreate="console.log(event)" :ondestroy="console.log(event)"></div>-->

<button :onclick="state.show = !state.show">show</button>


<div :text.json="state.arr"></div>

<div :onclick="state.arr.splice(1, 0, { color: 'black' })">slice</div>
<div :onclick="state.arr.push({ color: 'black' })">push</div>
<div :onclick="state.arr.shift()">shift</div>
<div :onclick="state.arr.unshift({ color: 'black' })">unshift</div>
<div :onclick="state.arr[1].color = 'pink'">change</div>
<hr>
<div :each="state.arr" :component="components.color">

</div>
