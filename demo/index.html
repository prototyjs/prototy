<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Document</title>
</head>
<body>
    <div id="app">
        <button :onclick="add()" :text="count"></button>
    </div>
    <script type="module">
        import { prototy } from '@prototy'

        console.log(prototy)
        const app = prototy({
            root: document.getElementById('app'),
            state: { count: 3 },
            methods: {
                add() {
                    this.state.count++
                }
            }
        })
    </script>
</body>
</html>
