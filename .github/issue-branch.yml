mode: auto
silent: false
branchName: "${issue.number}-${issue.title}"
autoCloseIssue: true
convertTitleToKebabCase: true
branches:
  - label: "feature"
    name: "feature/${branchName}"
  - label: "bug"
    name: "bugfix/${branchName}"
  - label: "docs"
    name: "docs/${branchName}"
  - label: "*"
    name: "task/${branchName}"
